    <div class="account-container">
      <!-- Reset-password prompt (shown by default on Shopify login page) -->
        <section class="reset-password">
        <h2>Reset your password</h2>
        <p>We will send you an email to reset your password</p>
        <form method="post" action="reset_password.php" id="RecoverCustomerForm">
          <label for="RecoverEmail">Email</label>
          <input type="email" name="customer[email]" id="RecoverEmail" required autofocus>
          <button type="submit" class="btn">Submit</button>
          <a href="login.html" class="btn cancel">Cancel</a>
        </form>
      </section>
    </div>
  </main>
