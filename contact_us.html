<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | FurEver Home</title>
  <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="img/favicon.ico" type="image/x-icon" />
  <style>
    body {
      padding-top: 50px;
      background-color: #fdf8f4;
    }
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      color: #e58e26;
      margin-bottom: 1rem;
    }

    .contact-info {
      margin-bottom: 2rem;
      text-align: center;
    }

    .contact-info p {
      margin: 0.5rem 0;
    }

    form {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      margin-top: 1.5rem;
      background-color: #e58e26;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #cf7200;
    }

    footer {
      background-color: #333;
      color: #f1f1f1;
      text-align: center;
      padding: 1rem;
      margin-top: 3rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="javascript:history.back()" class="brand">
                <img src="img/fureverhomeLogo.png" alt="Simple Logo" >
      </a>
      <ul class="nav-links">
        <li><a href="javascript:history.back()">Back</a></li>

      </ul>
      <div class="menu-toggle" id="menu-toggle"><a class="back" href="javascript:history.back()">Back</a></div>
    </div>
  </nav>

  <main>
    <h1>Contact Us</h1>

    <div class="contact-info">
      <p><strong>Email:</strong> fureverhome@gmail.com</p>
      <p><strong>Phone:</strong> +60 123-456-789</p>
      <p><strong>Address:</strong> 22 Jalan Kucing, 43000 Kajang, Selangor</p>
    </div>

    <form action="mailto:fureverhome@gmail.com" method="POST" enctype="text/plain">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Your Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <div class="footer-left">
        <p>&copy; 2025 FurEver Home. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        
      </div>
    </div>
  </footer>

</body>
</html>
